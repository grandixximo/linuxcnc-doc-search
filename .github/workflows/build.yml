name: Build searchable docs

# Pulls the HTML docs that LinuxCNC CI already publishes, adds pagefind search,
# and uploads the result as an artifact. Runs weekly and on demand.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1"   # Mondays 04:00 UTC

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Download LinuxCNC HTML docs artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          # A token that can read LinuxCNC/linuxcnc Actions artifacts. The
          # default GITHUB_TOKEN is scoped to this repo only, so set a secret
          # SOURCE_TOKEN: a classic PAT with the public_repo scope.
          github_token: ${{ secrets.SOURCE_TOKEN || github.token }}
          repo: LinuxCNC/linuxcnc
          workflow: ci.yml
          workflow_conclusion: success
          branch: master
          name: linuxcnc-doc.tar.gz
          path: artifact

      - name: Extract docs
        run: |
          set -x
          tarball=$(find artifact -name '*.tar.gz' | head -1)
          test -n "$tarball"
          tar -xzf "$tarball"   # produces ./html
          test -d html

      - name: Add search
        run: ./scripts/build.sh html

      - name: Upload searchable docs
        uses: actions/upload-artifact@v4
        with:
          name: linuxcnc-doc-search
          path: html
          if-no-files-found: error
