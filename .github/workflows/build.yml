name: Build searchable docs

# Pulls the HTML docs that LinuxCNC CI already publishes, adds pagefind search,
# and uploads the result as an artifact. Runs weekly and on demand.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1"   # Mondays 04:00 UTC

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v6

      - name: Download LinuxCNC HTML docs
        # The linuxcnc-doc.tar.gz artifact is uploaded with archive:false, so it
        # comes back as the raw tar.gz (not a zip); fetch it straight from the
        # API. SOURCE_TOKEN is a classic PAT with the public_repo scope (the
        # default GITHUB_TOKEN cannot read another repo's artifacts).
        env:
          TOKEN: ${{ secrets.SOURCE_TOKEN }}
        run: |
          set -eux
          api=https://api.github.com/repos/LinuxCNC/linuxcnc
          run_id=$(curl -fsSL -H "Authorization: Bearer $TOKEN" \
            "$api/actions/workflows/ci.yml/runs?branch=master&status=success&per_page=1" \
            | python3 -c 'import sys,json;print(json.load(sys.stdin)["workflow_runs"][0]["id"])')
          url=$(curl -fsSL -H "Authorization: Bearer $TOKEN" \
            "$api/actions/runs/$run_id/artifacts" \
            | python3 -c 'import sys,json;a=[x for x in json.load(sys.stdin)["artifacts"] if x["name"]=="linuxcnc-doc.tar.gz"];print(a[0]["archive_download_url"])')
          curl -fsSL -H "Authorization: Bearer $TOKEN" -o docs.tar.gz "$url"
          tar -xzf docs.tar.gz   # produces ./html
          test -d html

      - name: Add search
        run: ./scripts/build.sh html

      - name: Upload searchable docs
        uses: actions/upload-artifact@v7
        with:
          name: linuxcnc-doc-search
          path: html
          if-no-files-found: error
